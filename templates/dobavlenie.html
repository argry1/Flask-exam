<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Резуьтаты</title>
        <style type="text/css">

.parol input{
  display: block;
  margin: 0 auto;
  width: 30%;
  height: 45px;
  border-radius: 10px;
  border:none;
  outline: none;
}
input:focus {
  color: #000000;
  border-radius: 10px;
  border: 2px solid #423c63;
}
.form_auth_button{
    display: block;
    width: 30%;
    margin: 0 auto;
    margin-top: 10px;
    border-radius: 10px;
    height: 35px;
    border: none;
    cursor: pointer;
}

   .back {
    width: 35px;
    lenght: 70px;
    background: #423c63;
    color: #ffffff;
    padding:-5px;
    padding-right: 30px;
    position:absolute;

    border: solid 1px black;
    left: 10px;
    border-radius: 10px;
    }

    .link {
      text-decoration: none;
    }

body {
  background: rgb(66,60,99);
background: linear-gradient(90deg, rgba(66,60,99,1) 0%, rgba(190,180,255,1) 48%, rgba(255,137,239,1) 100%);}
html {
  height:100%;
}

body {
  margin:0;
}

.bg {
  animation:slide 3s ease-in-out infinite alternate;
  background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee 100%);
  bottom:0;
  left:-50%;
  opacity:.5;
  position:fixed;
  right:-50%;
  top:0;
  z-index:-1;
}

.bg2 {
  animation-direction:alternate-reverse;
  animation-duration:4s;
}

.bg3 {
  animation-duration:5s;
}

.content {
  background-color:rgba(255,255,255,.8);
  border-radius:.25em;
  box-shadow:0 0 .25em rgba(0,0,0,.25);
  box-sizing:border-box;
  left:50%;
  padding:10vmin;
  position:fixed;
  text-align:center;
  top:50%;
  transform:translate(-50%, -50%);
}

h1 {
  font-family:monospace;
}

@keyframes slide {
  0% {
    transform:translateX(-25%);
  }
  100% {
    transform:translateX(25%);
  }
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg bg2"></div>
<div class="bg bg3"></div>
   <br />

<div class="back">
    <a class="link" href="vybor.html"><p><font size="5" color="white" face="footlight mt light">ㅤ«</p></a>
</div>
   <br />

   <br />
   <br />

<div class="parol">
  <div class="parol">
    <p class="auth" align="center"><font size="5" color="white" face="footlight mt light">Добавить участника</p>
    <form class="form_auth_style"  method="post">
      <input type="text" name="fio" placeholder="Введите имя" required >
      <button class="form_auth_button" type="submit" name="form_auth_submit">Добавить</button>
    </form>
  </div>
</div>
</body>
</html>

    <style type="text/css">


body {
  background: rgb(66,60,99);
background: linear-gradient(90deg, rgba(66,60,99,1) 0%, rgba(190,180,255,1) 48%, rgba(255,137,239,1) 100%);}
html {
  height:100%;
}

body {
  margin:0;
}

.bg {
  animation:slide 25s ease-in-out infinite alternate;
  background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee 100%);
  bottom:0;
  left:-50%;
  opacity:.5;
  position:fixed;
  right:-50%;
  top:0;
  z-index:-1;
}

.bg2 {
  animation-direction:alternate-reverse;
  animation-duration:25s;
}

.bg3 {
  animation-duration:20s;
}

.content {
  background-color:rgba(255,255,255,.8);
  border-radius:.25em;
  box-shadow:0 0 .25em rgba(0,0,0,.25);
  box-sizing:border-box;
  left:50%;
  padding:10vmin;
  position:fixed;
  text-align:center;
  top:50%;
  transform:translate(-50%, -50%);
}

   .back {
    width: 35px;
    lenght: 70px;
    background: #423c63;
    color: #ffffff;
    padding:-5px;
    padding-right: 30px;
    position:absolute;

    border: solid 1px black;
    top: 10px;
    left: 10px;
    border-radius: 10px;
    }

   .dobav {

   .link {

}

}

@keyframes slide {
  0% {
    transform:translateX(-25%);
  }
  100% {

}
